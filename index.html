<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisandeep Chenna | Machine Learning Engineer</title>
    <link rel="icon" type="image/png" href="icons/favicon-32x32.png">
    
    <!-- 1. Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- 2. FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 3. React & ReactDOM (Core Framework) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 4. Babel (To understand JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- FODT Prevention: Apply theme before paint -->
    <script>
        (function() {
            const saved = localStorage.getItem('portfolio-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        html { 
            scroll-behavior: smooth;
            scroll-padding-top: 50px; /* Account for fixed navbar height */
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Hide scrollbar for music window */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* ============================== */
        /* SMOOTH THEME TRANSITION        */
        /* ============================== */
        *, *::before, *::after {
            transition: background-color 0.4s ease, 
                        border-color 0.4s ease,
                        box-shadow 0.3s ease;
        }
        /* Exclude elements where color transitions look bad */
        .no-theme-transition, .no-theme-transition * {
            transition: none !important;
        }

        /* ============================== */
        /* THEME TOGGLE — CELESTIAL MORPH */
        /* ============================== */
        .theme-toggle {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
        }
        .theme-toggle:active {
            transform: scale(0.95);
        }

        /* Sun / Moon icon morph */
        .theme-toggle .toggle-icon {
            position: absolute;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.3s ease;
        }
        .theme-toggle .sun-icon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }
        .theme-toggle .moon-icon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }
        .dark .theme-toggle .sun-icon {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }
        .dark .theme-toggle .moon-icon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* Sun rays animation */
        @keyframes rayPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .sun-rays {
            position: absolute;
            width: 36px;
            height: 36px;
            animation: rayPulse 3s ease-in-out infinite;
            transition: opacity 0.3s ease;
        }
        .dark .sun-rays {
            opacity: 0 !important;
        }
        
        /* Stars for moon mode */
        @keyframes starTwinkle1 { 0%,100%{opacity:0} 50%{opacity:1} }
        @keyframes starTwinkle2 { 0%,100%{opacity:0} 40%{opacity:0.8} }
        @keyframes starTwinkle3 { 0%,100%{opacity:0.3} 60%{opacity:1} }
        
        .moon-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fbbf24;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .dark .moon-star { opacity: 1; }
        .moon-star:nth-child(1) { top: 6px; right: 8px; animation: starTwinkle1 2s ease-in-out infinite; }
        .moon-star:nth-child(2) { top: 10px; right: 4px; animation: starTwinkle2 2.5s ease-in-out infinite 0.3s; width: 2px; height: 2px; }
        .moon-star:nth-child(3) { bottom: 10px; left: 6px; animation: starTwinkle3 1.8s ease-in-out infinite 0.6s; }

        /* ============================== */
        /* MUSIC SECTION STYLES           */
        /* ============================== */
        
        /* Equalizer bars animation */
        @keyframes eqBar1 { 0%,100%{height:4px} 50%{height:16px} }
        @keyframes eqBar2 { 0%,100%{height:8px} 50%{height:20px} }
        @keyframes eqBar3 { 0%,100%{height:6px} 50%{height:14px} }
        @keyframes eqBar4 { 0%,100%{height:10px} 50%{height:18px} }
        
        .eq-bar { width: 3px; border-radius: 2px; display: inline-block; }
        .eq-bar-1 { animation: eqBar1 0.8s ease-in-out infinite; }
        .eq-bar-2 { animation: eqBar2 0.6s ease-in-out infinite 0.1s; }
        .eq-bar-3 { animation: eqBar3 0.7s ease-in-out infinite 0.2s; }
        .eq-bar-4 { animation: eqBar4 0.5s ease-in-out infinite 0.15s; }
        
        /* Vinyl spin animation */
        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-spin { animation: vinylSpin 4s linear infinite; }
        
        /* Gradient shimmer for header text */
        @keyframes gradientShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .shimmer-text {
            background-size: 200% auto;
            animation: gradientShimmer 3s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Song row hover glow */
        .song-row:hover .song-index { opacity: 0; }
        .song-row:hover .song-play-icon { opacity: 1; }
        .song-play-icon { opacity: 0; transition: opacity 0.15s ease; }
        .song-index { transition: opacity 0.15s ease; }
        
        /* Pulse dot for "Now Playing" feel */
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
        
        /* ============================== */
        /* GENERAL ANIMATION CLASSES      */
        /* ============================== */
        @keyframes fadeInUp { 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Gallery image enter animation */
        @keyframes galleryImageEnter {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .gallery-image-enter {
            animation: galleryImageEnter 0.35s ease-out;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 100px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <div id="root">
        <div class="spinner"></div>
    </div>

    <!-- Load data first, then app -->
    <script src="scripts/portfolio.js"></script>
    <script type="text/babel" src="scripts/index.js"></script>
</body>
</html>
